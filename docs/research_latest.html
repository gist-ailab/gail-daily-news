<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI & Robotics Research Daily — 2026-04-15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Neumorphism Design System — Light */
  --primary: #006666;
  --primary-light: #008080;
  --secondary: #F1F2F5;
  --surface: #E7E5E4;
  --surface-card: #E7E5E4;
  --surface-highlight: #EDE9E3;
  --text: #1E2938;
  --text-secondary: #4A5568;
  --text-tertiary: #8494A7;
  --border: transparent;
  --border-highlight: #006666;
  --accent: #006666;
  --accent-hover: #004D4D;
  --star-filled: #FE9900;
  --star-empty: #C4C4C4;
  --badge-bg: #D9D7D5;
  --badge-text: #006666;
  --success: #00A63D;
  --warning: #FE9900;
  --danger: #FF2157;
  --info: #006666;
  --gradient-start: #006666;
  --gradient-mid: #008080;
  --gradient-end: #00A3A3;
  --header-text: #F1F2F5;
  --footer-bg: #1E2938;
  --footer-text: #8494A7;
  /* Neumorphic shadows */
  --neu-light: rgba(255,255,255,0.7);
  --neu-dark: rgba(0,0,0,0.15);
  --shadow-raised: 6px 6px 12px var(--neu-dark), -6px -6px 12px var(--neu-light);
  --shadow-raised-sm: 3px 3px 6px var(--neu-dark), -3px -3px 6px var(--neu-light);
  --shadow-inset: inset 3px 3px 6px var(--neu-dark), inset -3px -3px 6px var(--neu-light);
  --shadow-hover: 8px 8px 16px var(--neu-dark), -8px -8px 16px var(--neu-light);
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --primary: #00CCCC;
    --primary-light: #33E0E0;
    --secondary: #2D3748;
    --surface: #1A202C;
    --surface-card: #1A202C;
    --surface-highlight: #222C3C;
    --text: #E2E8F0;
    --text-secondary: #A0AEC0;
    --text-tertiary: #718096;
    --border: transparent;
    --border-highlight: #00CCCC;
    --accent: #00CCCC;
    --accent-hover: #33E0E0;
    --star-filled: #FEB800;
    --star-empty: #4A5568;
    --badge-bg: #2D3748;
    --badge-text: #00CCCC;
    --gradient-start: #0D1117;
    --gradient-mid: #1A202C;
    --gradient-end: #004D4D;
    --header-text: #E2E8F0;
    --footer-bg: #0D1117;
    --footer-text: #718096;
    --neu-light: rgba(255,255,255,0.05);
    --neu-dark: rgba(0,0,0,0.5);
    --shadow-raised: 6px 6px 12px var(--neu-dark), -6px -6px 12px var(--neu-light);
    --shadow-raised-sm: 3px 3px 6px var(--neu-dark), -3px -3px 6px var(--neu-light);
    --shadow-inset: inset 3px 3px 6px var(--neu-dark), inset -3px -3px 6px var(--neu-light);
    --shadow-hover: 8px 8px 16px var(--neu-dark), -8px -8px 16px var(--neu-light);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Mono', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, monospace;
  background: var(--surface);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── Hero Header ── */
.hero {
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
  color: var(--header-text);
  padding: 3.5rem 1.5rem 3rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.hero-inner {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
}
.hero .icon {
  font-size: 2.5rem;
  margin-bottom: 0.75rem;
}
.hero h1 {
  font-family: 'Space Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.hero .subtitle {
  font-size: 0.85rem;
  opacity: 0.8;
  font-weight: 400;
}
.hero .stats {
  display: inline-flex;
  gap: 1.5rem;
  margin-top: 1.25rem;
  font-size: 0.75rem;
  opacity: 0.7;
  font-weight: 400;
}
.hero .stats span {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

/* ── Container ── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* ── Section ── */
.section {
  margin-bottom: 2.5rem;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--badge-bg);
}
.section-header h2 {
  font-family: 'Space Mono', 'Noto Sans KR', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--primary);
}
.section-header .section-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--text-tertiary);
  background: var(--badge-bg);
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  box-shadow: var(--shadow-raised-sm);
}

/* ── Item Card (Neumorphic) ── */
.item {
  padding: 1.25rem 1.5rem;
  margin-bottom: 10px;
  background: var(--surface-card);
  border: none;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-raised);
  transition: box-shadow 0.25s ease, transform 0.2s ease;
}
.item:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}
.item.highlight {
  background: var(--surface-highlight);
  border-left: 3px solid var(--border-highlight);
  box-shadow: var(--shadow-raised), inset 0 0 0 1px var(--border-highlight);
}
.item-top {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.item-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  flex: 1;
  min-width: 200px;
  line-height: 1.5;
}
.item-title a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.15s;
}
.item-title a:hover {
  color: var(--accent-hover);
  text-decoration: underline;
}
.item-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}
.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  padding: 0.2rem 0.55rem;
  border-radius: 8px;
  background: var(--badge-bg);
  color: var(--badge-text);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  box-shadow: var(--shadow-raised-sm);
}
.item-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--primary);
  font-weight: 500;
  white-space: nowrap;
}
.stars {
  font-size: 0.75rem;
  letter-spacing: 1px;
  white-space: nowrap;
}
.stars .filled { color: var(--star-filled); }
.stars .empty { color: var(--star-empty); }
.item.highlight .stars .filled { color: var(--danger); }
@media (prefers-color-scheme: dark) {
  .item.highlight .stars .filled { color: var(--star-filled); }
}
.item-summary {
  margin-top: 0.6rem;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ── Theme Toggle (Neumorphic) ── */
.theme-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  box-shadow: var(--shadow-raised);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 100;
}
.theme-toggle:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-hover);
}
.theme-toggle:active {
  box-shadow: var(--shadow-inset);
  transform: scale(0.96);
}
.theme-toggle .icon-light,
.theme-toggle .icon-dark { display: none; }

html:not([data-theme]) .theme-toggle .icon-light { display: none; }
html:not([data-theme]) .theme-toggle .icon-dark { display: none; }
html:not([data-theme]) .theme-toggle::after { content: '🌓'; }

html[data-theme="light"] .theme-toggle .icon-light { display: inline; }
html[data-theme="light"] .theme-toggle .icon-dark { display: none; }
html[data-theme="light"] .theme-toggle::after { content: none; }

html[data-theme="dark"] .theme-toggle .icon-light { display: none; }
html[data-theme="dark"] .theme-toggle .icon-dark { display: inline; }
html[data-theme="dark"] .theme-toggle::after { content: none; }

/* Force dark when data-theme="dark" */
html[data-theme="dark"] {
  --primary: #00CCCC;
  --primary-light: #33E0E0;
  --secondary: #2D3748;
  --surface: #1A202C;
  --surface-card: #1A202C;
  --surface-highlight: #222C3C;
  --text: #E2E8F0;
  --text-secondary: #A0AEC0;
  --text-tertiary: #718096;
  --border: transparent;
  --border-highlight: #00CCCC;
  --accent: #00CCCC;
  --accent-hover: #33E0E0;
  --star-filled: #FEB800;
  --star-empty: #4A5568;
  --badge-bg: #2D3748;
  --badge-text: #00CCCC;
  --gradient-start: #0D1117;
  --gradient-mid: #1A202C;
  --gradient-end: #004D4D;
  --header-text: #E2E8F0;
  --footer-bg: #0D1117;
  --footer-text: #718096;
  --neu-light: rgba(255,255,255,0.05);
  --neu-dark: rgba(0,0,0,0.5);
  --shadow-raised: 6px 6px 12px var(--neu-dark), -6px -6px 12px var(--neu-light);
  --shadow-raised-sm: 3px 3px 6px var(--neu-dark), -3px -3px 6px var(--neu-light);
  --shadow-inset: inset 3px 3px 6px var(--neu-dark), inset -3px -3px 6px var(--neu-light);
  --shadow-hover: 8px 8px 16px var(--neu-dark), -8px -8px 16px var(--neu-light);
}
html[data-theme="dark"] .item.highlight .stars .filled { color: #FEB800; }

/* Force light when data-theme="light" */
html[data-theme="light"] {
  --primary: #006666;
  --primary-light: #008080;
  --secondary: #F1F2F5;
  --surface: #E7E5E4;
  --surface-card: #E7E5E4;
  --surface-highlight: #EDE9E3;
  --text: #1E2938;
  --text-secondary: #4A5568;
  --text-tertiary: #8494A7;
  --border: transparent;
  --border-highlight: #006666;
  --accent: #006666;
  --accent-hover: #004D4D;
  --star-filled: #FE9900;
  --star-empty: #C4C4C4;
  --badge-bg: #D9D7D5;
  --badge-text: #006666;
  --gradient-start: #006666;
  --gradient-mid: #008080;
  --gradient-end: #00A3A3;
  --header-text: #F1F2F5;
  --footer-bg: #1E2938;
  --footer-text: #8494A7;
  --neu-light: rgba(255,255,255,0.7);
  --neu-dark: rgba(0,0,0,0.15);
  --shadow-raised: 6px 6px 12px var(--neu-dark), -6px -6px 12px var(--neu-light);
  --shadow-raised-sm: 3px 3px 6px var(--neu-dark), -3px -3px 6px var(--neu-light);
  --shadow-inset: inset 3px 3px 6px var(--neu-dark), inset -3px -3px 6px var(--neu-light);
  --shadow-hover: 8px 8px 16px var(--neu-dark), -8px -8px 16px var(--neu-light);
}
html[data-theme="light"] .item.highlight .stars .filled { color: #FF2157; }

/* ── Footer ── */
footer {
  background: var(--footer-bg);
  color: var(--footer-text);
  text-align: center;
  padding: 2.5rem 1.5rem;
  font-size: 0.75rem;
}
footer .footer-inner {
  max-width: 900px;
  margin: 0 auto;
}
footer .divider {
  width: 40px;
  height: 2px;
  background: var(--text-tertiary);
  margin: 0.75rem auto;
  opacity: 0.3;
}
footer .credit {
  margin-top: 0.5rem;
  font-size: 0.7rem;
  opacity: 0.7;
}
footer .credit a {
  color: var(--footer-text);
  text-decoration: none;
  font-weight: 700;
}
footer .credit a:hover { text-decoration: underline; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .hero { padding: 2.5rem 1rem 2rem; }
  .hero h1 { font-size: 1.4rem; letter-spacing: -0.06em; }
  .hero .subtitle { font-size: 0.85rem; letter-spacing: -0.03em; }
  .hero .icon { font-size: 2rem; }
  .container { padding: 1.25rem 1rem; }
  .item { padding: 1rem 1.1rem; border-radius: var(--radius-sm); }
  .item-top { flex-direction: column; gap: 0.4rem; }
  .item-title { font-size: 0.85rem; min-width: 0; }
  .section-header h2 { font-size: 1rem; }
  .theme-toggle { bottom: 16px; right: 16px; width: 40px; height: 40px; }

  /* 모바일: item-meta를 타이틀 아래 가로 배치 */
  .item-meta {
    flex-wrap: wrap;
    gap: 0.4rem;
  }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="icon">&#9749;</div>
    <h1>AI & Robotics Research Daily</h1>
    <div class="subtitle">2026-04-15 — AI/Robotics 분야 최신 연구 큐레이션</div>
    <div class="stats">
      <span>50건 큐레이션</span>
      <span>15개 소스</span>
      <span>중요도 기반 정렬</span>
    </div>
  </div>
</div>

<div class="container">



</div>

<footer>
  <div class="footer-inner">
    <div>2026-04-15 UTC 생성 · 15개 소스 · 50건 큐레이션</div>
    <div class="divider"></div>
    <div class="credit">
      Made by <a href="https://github.com/SeongjuLee" target="_blank" rel="noopener">Seongju Lee</a> · Powered by ai-news-mcp
    </div>
  </div>
</footer>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <span class="icon-light">&#9728;&#65039;</span>
  <span class="icon-dark">&#9789;</span>
</button>

<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var next;
  if (!current) {
    next = prefersDark ? 'light' : 'dark';
  } else if (current === 'dark') {
    next = 'light';
  } else {
    next = 'dark';
  }
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>

</body>
</html>
